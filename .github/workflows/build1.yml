name: Build TALIH-PD2 Kernel with KernelSU (Clang LLVM, KSU v0.4.3)

on:
  workflow_dispatch:
    inputs:
      ksu_tag:
        description: 'KernelSU tag (4.19 推荐 ≤ v0.4.3)'
        default: 'v0.4.3'
        type: string
      defconfig:
        description: 'Defconfig 名（留空使用 ls12_mt8797_wifi_64_defconfig）'
        default: 'ls12_mt8797_wifi_64_defconfig'
        type: string

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 1. 下载专用 clang 及 LLVM 工具链 ──
      - name: Download custom clang
        run: |
          CLANG_PATH="$PWD/prebuilts/clang/host/linux-x86/clang-r383902"
          mkdir -p "$CLANG_PATH/bin"
          cd "$CLANG_PATH/bin"
          curl -L -o clang "https://github.com/Kevin233B/TALIH-PD2-Kernel/releases/download/other/clang"
          chmod +x clang
          ./clang --version | head -1

      # ── 2. 安装交叉编译所需的 GNU 工具（as, ld 等）──
      - name: Install cross toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            bc flex bison libssl-dev make git cpio python3

      # ── 3. 合并 KernelSU v0.4.3 并手动应用 4.19 补丁 ──
      - name: Setup KernelSU v0.4.3 with manual patches
        run: |
          # 克隆 KernelSU 仓库到临时目录
          git clone --depth=1 --branch ${{ inputs.ksu_tag }} \
            https://github.com/tiann/KernelSU.git /tmp/KernelSU

          # 首先运行官方 setup.sh（它会尝试打补丁，但可能跳过一些）
          bash /tmp/KernelSU/kernel/setup.sh ${{ inputs.ksu_tag }} || true

          # 手动应用 4.19 non-GKI 补丁（确保所有 hook 都正确嵌入）
          PATCH_DIR="/tmp/KernelSU/kernel/patches/4.19"
          if [ -d "$PATCH_DIR" ]; then
            for patch in "$PATCH_DIR"/*.patch; do
              echo "Applying $patch ..."
              git apply --ignore-space-change --ignore-whitespace "$patch" 2>/dev/null || \
                echo "Warning: patch $patch may have been partially applied, continuing."
            done
          else
            echo "No 4.19 patches directory found, skipping manual patching."
          fi

          # 清理临时目录
          rm -rf /tmp/KernelSU

          # 验证关键 hook 文件是否存在
          for file in drivers/kernelsu/core_hook.c; do
            if [ ! -f "$file" ]; then
              echo "::error::$file missing! KernelSU integration failed."
              exit 1
            fi
          done
          echo "KernelSU ${{ inputs.ksu_tag }} setup completed."

      # ── 4. 确定 defconfig ──
      - name: Detect defconfig
        id: def
        run: |
          if [ -n "${{ inputs.defconfig }}" ]; then
            DEF="${{ inputs.defconfig }}"
          else
            DEF="ls12_mt8797_wifi_64_defconfig"
          fi
          echo "name=$DEF" >> $GITHUB_OUTPUT
          echo "Using defconfig: $DEF"

      # ── 5. 配置内核（开启 KSU / kprobes / overlayfs）──
      - name: Configure kernel
        run: |
          CLANG_PATH="$PWD/prebuilts/clang/host/linux-x86/clang-r383902"
          CLANG_BIN="$CLANG_PATH/bin"
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-

          make O=out ARCH=arm64 \
            CC=$CLANG_BIN/clang \
            LD=$CLANG_BIN/ld.lld \
            AR=$CLANG_BIN/llvm-ar \
            NM=$CLANG_BIN/llvm-nm \
            OBJCOPY=$CLANG_BIN/llvm-objcopy \
            OBJDUMP=$CLANG_BIN/llvm-objdump \
            READELF=$CLANG_BIN/llvm-readelf \
            OBJSIZE=$CLANG_BIN/llvm-size \
            STRIP=$CLANG_BIN/llvm-strip \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM=1 LLVM_IAS=1 \
            ${{ steps.def.outputs.name }}

          # 开启 KSU / kprobes / overlayfs
          ./scripts/config --file out/.config \
            -e KPROBES -e HAVE_KPROBES \
            -e OVERLAY_FS \
            -e KSU
          make O=out ARCH=arm64 olddefconfig

      # ── 6. 编译内核 ──
      - name: Build Image.gz-dtb
        run: |
          CLANG_PATH="$PWD/prebuilts/clang/host/linux-x86/clang-r383902"
          CLANG_BIN="$CLANG_PATH/bin"
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-

          make O=out ARCH=arm64 \
            CC=$CLANG_BIN/clang \
            LD=$CLANG_BIN/ld.lld \
            AR=$CLANG_BIN/llvm-ar \
            NM=$CLANG_BIN/llvm-nm \
            OBJCOPY=$CLANG_BIN/llvm-objcopy \
            OBJDUMP=$CLANG_BIN/llvm-objdump \
            READELF=$CLANG_BIN/llvm-readelf \
            OBJSIZE=$CLANG_BIN/llvm-size \
            STRIP=$CLANG_BIN/llvm-strip \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM=1 LLVM_IAS=1 \
            -j$(nproc) 2>&1 | tee build.log
        continue-on-error: true

      # ── 7. 检查编译产物 ──
      - name: Check build result
        run: |
          if [ -f out/arch/arm64/boot/Image.gz-dtb ]; then
            echo "✅ Image.gz-dtb 生成成功"
            ls -lh out/arch/arm64/boot/Image.gz-dtb
          else
            echo "::warning::Image.gz-dtb 未生成，查看 build.log"
            tail -200 build.log
          fi

      # ── 8. 打包 AnyKernel3 ──
      - name: Package AnyKernel3
        if: always()
        run: |
          if [ ! -f out/arch/arm64/boot/Image.gz-dtb ]; then
            echo "::notice::无 Image.gz-dtb，跳过打包"
            exit 0
          fi
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 -b master ak3
          cp out/arch/arm64/boot/Image.gz-dtb ak3/
          cd ak3
          zip -r ../TALIH-PD2-KSU-${{ inputs.ksu_tag }}-clang.zip *
          echo "AnyKernel3 刷机包已生成"

      # ── 9. 上传编译产物 ──
      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TALIH-PD2-KSU-${{ inputs.ksu_tag }}-clang
          path: |
            TALIH-PD2-KSU-*-clang.zip
            out/arch/arm64/boot/Image.gz-dtb
            build.log
