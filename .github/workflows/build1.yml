name: Build KernelSU Kernel (Auto Update)

on:
  workflow_dispatch:
    inputs:
      ksu_tag:
        description: 'KernelSU 版本 (留空为最新版)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      # ── 1. 检出内核源码 ──
      - name: Checkout Source
        uses: actions/checkout@v4

      # ── 2. 安装编译依赖 ──
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq build-essential bc bison flex libssl-dev libelf-dev wget curl

      # ── 3. 设置 Clang 工具链 ──
      - name: Setup custom clang
        run: |
          # 创建目录存放预编译工具
          mkdir -p $GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/
          
          # 下载 Clang (这里使用示例地址，请替换为你实际使用的下载链接)
          # 如果你有固定的 Clang 包，建议直接上传到仓库 Release 里下载更稳定
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/clang-r383902/+archive/refs/heads/master.tar.gz -O clang.tar.gz
          tar -xzf clang.tar.gz -C $GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/
          
          # 设置环境变量
          echo "CLANG_PATH=$GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-r383902" >> $GITHUB_ENV
          echo "PATH=$GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-r383902/bin:$PATH" >> $GITHUB_ENV

      # ── 4. 克隆 KernelSU (自动拉取最新版) ──
      - name: Clone KernelSU (Latest)
        run: |
          git clone --depth=1 https://github.com/tiann/KernelSU.git /tmp/KernelSU
          cd /tmp/KernelSU
          # 打印当前拉取到的提交信息，方便排查
          git log --oneline -1

      # ── 5. 运行 setup.sh 并应用 4.19 补丁 ──
      - name: Setup KernelSU and Apply Patches
        run: |
          cd /tmp/KernelSU/kernel
          
          # 1. 运行官方 setup 脚本
          sh setup.sh
          
          # 2. 强制应用 4.19 的非 GKI 补丁
          # 注意：官方 setup.sh 有时不会自动应用非 GKI 补丁，这里手动指定目录应用
          PATCH_DIR="/tmp/KernelSU/kernel/patches/4.19"
          
          if [ -d "$PATCH_DIR" ]; then
            echo "🔍 发现 4.19 补丁目录，开始应用..."
            cd $PATCH_DIR
            for patch in *.patch; do
              echo "📄 正在应用补丁: $patch"
              # 使用 git am 应用补丁，这比 patch 命令更稳健，能处理文件重命名等情况
              git am --3way < "$patch"
            done
          else
            echo "⚠️ 未找到 4.19 补丁目录，请检查 KernelSU 源码结构。"
            ls /tmp/KernelSU/kernel/patches/
          fi

      # ── 6. 拷贝驱动文件并配置内核 ──
      - name: Copy drivers and Configure
        run: |
          # 将 KernelSU 驱动拷贝到内核目录
          cp -r /tmp/KernelSU/drivers/KernelSU/ $GITHUB_WORKSPACE/drivers/KernelSU/
          
          # 进入内核目录
          cd $GITHUB_WORKSPACE
          
          # 开启必要的内核配置
          ./scripts/config --file out/.config \
            -e KPROBES -e HAVE_KPROBES \
            -e OVERLAY_FS \
            -e KSU
            
          # 生成默认配置
          make O=out ARCH=arm64 olddefconfig

      # ── 7. 编译内核 ──
      - name: Build Image.gz-dtb
        run: |
          cd $GITHUB_WORKSPACE
          export PATH=$CLANG_PATH/bin:$PATH
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-

          make O=out ARCH=arm64 \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            READELF=llvm-readelf \
            OBJSIZE=llvm-size \
            STRIP=llvm-strip \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM=1 LLVM_IAS=1 \
            -j$(nproc) 2>&1 | tee build.log
        continue-on-error: true

      # ── 8. 检查编译产物 ──
      - name: Check build result
        run: |
          cd $GITHUB_WORKSPACE
          if [ -f out/arch/arm64/boot/Image.gz-dtb ]; then
            echo "✅ Image.gz-dtb 生成成功"
            ls -lh out/arch/arm64/boot/Image.gz-dtb
          else
            echo "::error::Image.gz-dtb 未生成！"
            tail -200 build.log
            exit 1
          fi

      # ── 9. 打包 AnyKernel3 ──
      - name: Package AnyKernel3
        if: success()
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ak3
          cp out/arch/arm64/boot/Image.gz-dtb ak3/
          cd ak3
          ZIP_NAME="TALIH-PD2-KSU-$(date +%Y%m%d)-clang.zip"
          zip -r ../$ZIP_NAME *
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      # ── 10. 上传编译产物 ──
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Build-Result
          path: |
            ${{ env.ZIP_NAME }}
            out/arch/arm64/boot/Image.gz-dtb
            build.log
