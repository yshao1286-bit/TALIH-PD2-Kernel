name: Build TALIH-PD2 Kernel with KernelSU (Clang from Kevin233B)

on:
  workflow_dispatch:
    inputs:
      ksu_tag:
        description: 'KernelSU tag (4.19 必须 ≤ v0.5.2)'
        default: 'v0.5.2'
        type: string
      defconfig:
        description: 'Defconfig 名（留空自动查找 mt8797 开头）'
        default: ''
        type: string

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 1. 合并 KernelSU ──
      - name: Setup KernelSU
        run: |
          curl -LSs https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh | bash -s ${{ inputs.ksu_tag }}

      # ── 2. 下载并安装专用 clang ──
      - name: Setup custom clang
        run: |
          # 创建目标目录
          CLANG_PATH="$PWD/prebuilts/clang/host/linux-x86/clang-r383902"
          mkdir -p "$CLANG_PATH/bin"
          
          # 下载 clang 可执行文件（来自 Kevin233B 的 release）
          curl -L -o "$CLANG_PATH/bin/clang" \
            "https://github.com/Kevin233B/TALIH-PD2-Kernel/releases/download/other/clang"
          chmod +x "$CLANG_PATH/bin/clang"
          
          # 将 clang 所在目录加入 PATH
          echo "$CLANG_PATH/bin" >> $GITHUB_PATH
          
          # 验证版本
          clang --version | head -1

      # ── 3. 安装必要的交叉编译工具（GNU as/ld 仍需，LLVM_IAS=0）──
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \        # 提供 aarch64-linux-gnu-as, ld 等
            bc flex bison libssl-dev make git cpio python3

      # ── 4. 确定 defconfig ──
      - name: Detect defconfig
        id: def
        run: |
          if [ -n "${{ inputs.defconfig }}" ]; then
            DEF="${{ inputs.defconfig }}"
          else
            DEF=$(ls arch/arm64/configs/ | grep -im1 'mt8797.*_defconfig' | head -1)
            if [ -z "$DEF" ]; then
              echo "::error::找不到 mt8797 defconfig，请手动填写"
              exit 1
            fi
          fi
          echo "name=$DEF" >> $GITHUB_OUTPUT
          echo "Using defconfig: $DEF"

      # ── 5. 配置内核（开启 KSU / kprobes / overlayfs）──
      - name: Configure kernel
        run: |
          export ARCH=arm64 SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export LLVM_IAS=0                # 4.19 必须关闭内置汇编器

          make O=out ${{ steps.def.outputs.name }}

          ./scripts/config --file out/.config \
            -e KPROBES -e HAVE_KPROBES \
            -e OVERLAY_FS \
            -e KSU
          make O=out ARCH=arm64 olddefconfig

      # ── 6. 编译内核 ──
      - name: Build Image.gz-dtb
        run: |
          export ARCH=arm64 SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export LLVM_IAS=0

          make O=out -j$(nproc) Image.gz-dtb 2>&1 | tee build.log
        continue-on-error: true

      # ── 7. 检查编译产物 ──
      - name: Check build result
        run: |
          if [ -f out/arch/arm64/boot/Image.gz-dtb ]; then
            echo "✅ Image.gz-dtb 生成成功"
            ls -lh out/arch/arm64/boot/Image.gz-dtb
          else
            echo "::warning::Image.gz-dtb 未生成，查看 build.log"
            tail -200 build.log
          fi

      # ── 8. 打包 AnyKernel3 ──
      - name: Package AnyKernel3
        if: always()
        run: |
          if [ ! -f out/arch/arm64/boot/Image.gz-dtb ]; then
            echo "::notice::无 Image.gz-dtb，跳过打包"
            exit 0
          fi
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 -b master ak3
          cp out/arch/arm64/boot/Image.gz-dtb ak3/
          cd ak3
          zip -r ../TALIH-PD2-KSU-${{ inputs.ksu_tag }}-clang.zip *
          echo "AnyKernel3 刷机包已生成"

      # ── 9. 上传编译产物 ──
      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TALIH-PD2-KSU-${{ inputs.ksu_tag }}-clang
          path: |
            TALIH-PD2-KSU-*-clang.zip
            out/arch/arm64/boot/Image.gz-dtb
            build.log
