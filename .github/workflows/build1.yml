name: Build TALIH-PD2 Kernel with KernelSU (Custom Clang)

on:
  workflow_dispatch:
    inputs:
      ksu_tag:
        description: 'KernelSU Tag (e.g., v0.5.2)'
        required: true
        default: 'v0.5.2'
      defconfig:
        description: 'Defconfig Name (e.g., ls12_mt8797_wifi_64_defconfig)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 检出源码 ──
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. 设置 Clang 环境 (直接下载你指定的 Clang) ──
      - name: Setup custom clang
        run: |
          mkdir -p $PWD/prebuilts/clang/host/linux-x86/clang-r383902/bin
          cd $PWD/prebuilts/clang/host/linux-x86/clang-r383902/bin
          
          # 下载你提供的 Clang
          echo "正在下载 Clang..."
          curl -L -o clang "https://github.com/Kevin233B/TALIH-PD2-Kernel/releases/download/other/clang"
          chmod +x clang
          
          # 验证是否下载成功
          ./clang --version

      # ── 3. 检测 defconfig ──
      - name: Detect defconfig
        id: def
        run: |
          if [ -n "${{ inputs.defconfig }}" ]; then
            DEF="${{ inputs.defconfig }}"
          else
            DEF=$(ls arch/arm64/configs/ | grep -im1 'mt8797.*_defconfig' | head -1)
            if [ -z "$DEF" ]; then
              echo "::error::找不到 mt8797 defconfig，请手动填写"
              exit 1
            fi
          fi
          echo "name=$DEF" >> $GITHUB_OUTPUT
          echo "Using defconfig: $DEF"

      # ── 4. 配置内核 (使用 Clang) ──
      - name: Configure kernel
        run: |
          export ARCH=arm64 SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export PATH="$PWD/prebuilts/clang/host/linux-x86/clang-r383902/bin:$PATH"

          # 4.19 内核建议加上 -fgnu89-inline 防止内联报错
          make O=out ${{ steps.def.outputs.name }} KCFLAGS="-fgnu89-inline"

          ./scripts/config --file out/.config \
            -e KPROBES -e HAVE_KPROBES \
            -e OVERLAY_FS \
            -e KSU
          make O=out ARCH=arm64 olddefconfig

      # ── 5. 编译内核 ──
      - name: Build Image.gz-dtb
        run: |
          export ARCH=arm64 SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export PATH="$PWD/prebuilts/clang/host/linux-x86/clang-r383902/bin:$PATH"
          export KCFLAGS="-fgnu89-inline"

          make O=out -j$(nproc) Image.gz-dtb 2>&1 | tee build.log
        continue-on-error: true

      # ── 6. 检查编译产物 ──
      - name: Check build result
        run: |
          if [ -f out/arch/arm64/boot/Image.gz-dtb ]; then
            echo "✅ Image.gz-dtb 生成成功"
            ls -lh out/arch/arm64/boot/Image.gz-dtb
          else
            echo "::warning::Image.gz-dtb 未生成，查看 build.log"
            tail -200 build.log
          fi

      # ── 7. 打包 AnyKernel3 ──
      - name: Package AnyKernel3
        if: always()
        run: |
          if [ ! -f out/arch/arm64/boot/Image.gz-dtb ]; then
            echo "::notice::无 Image.gz-dtb，跳过打包"
            exit 0
          fi
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 -b master ak3
          cp out/arch/arm64/boot/Image.gz-dtb ak3/
          cd ak3
          zip -r ../TALIH-PD2-KSU-${{ inputs.ksu_tag }}-clang.zip *
          echo "AnyKernel3 刷机包已生成"

      # ── 8. 上传编译产物 ──
      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TALIH-PD2-KSU-${{ inputs.ksu_tag }}-clang
          path: |
            TALIH-PD2-KSU-*-clang.zip
            out/arch/arm64/boot/Image.gz-dtb
            build.log
