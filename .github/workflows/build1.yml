name: Build TALIH-PD2 Kernel with KernelSU (Clang + ls12_mt8797_wifi_64)

on:
  workflow_dispatch:
    inputs:
      ksu_tag:
        description: 'KernelSU tag (4.19 推荐 v0.4.0，留空走 main)'
        default: 'v0.4.0'
        type: string

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 1. 下载专用 clang（Kevin233B）──
      - name: Download custom clang
        run: |
          CLANG_PATH="$PWD/prebuilts/clang/host/linux-x86/clang-r383902"
          mkdir -p "$CLANG_PATH/bin"
          cd "$CLANG_PATH/bin"
          curl -L -o clang "https://github.com/Kevin233B/TALIH-PD2-Kernel/releases/download/other/clang"
          chmod +x clang
          ./clang --version | head -1

      # ── 2. 安装交叉编译依赖 ──
      - name: Install cross toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            bc flex bison libssl-dev make git cpio python3

      # ── 3. 手动集成 KernelSU（绕过 setup.sh 的 core_hook.c 问题）──
      - name: Manual Integrate KernelSU
        run: |
          TAG="${{ inputs.ksu_tag }}"
          if [ -z "$TAG" ]; then
            git clone --depth=1 https://github.com/tiann/KernelSU.git /tmp/KernelSU
          else
            git clone --depth=1 --branch "$TAG" \
              https://github.com/tiann/KernelSU.git /tmp/KernelSU
          fi

          echo "KernelSU cloned: $(cd /tmp/KernelSU && git log --oneline -1)"

          # 创建目标目录
          mkdir -p "$GITHUB_WORKSPACE/drivers/KernelSU"

          # 拷贝核心文件（新版本核心逻辑在 ksu.c，不再有 core_hook.c）
          cp /tmp/KernelSU/kernel/ksu.c "$GITHUB_WORKSPACE/drivers/KernelSU/" 2>/dev/null || true
          # 兼容老版本：如果有 core_hook.c 也拷
          [ -f /tmp/KernelSU/kernel/core_hook.c ] && \
            cp /tmp/KernelSU/kernel/core_hook.c "$GITHUB_WORKSPACE/drivers/KernelSU/"
          # 头文件
          cp /tmp/KernelSU/kernel/include/kernelsu.h "$GITHUB_WORKSPACE/drivers/KernelSU/" 2>/dev/null || true
          # selinux 目录
          cp -r /tmp/KernelSU/kernel/selinux "$GITHUB_WORKSPACE/drivers/KernelSU/" 2>/dev/null || true
          # 其他可能存在的源文件
          for f in /tmp/KernelSU/kernel/*.c; do
            [ -f "$f" ] && cp "$f" "$GITHUB_WORKSPACE/drivers/KernelSU/"
          done
          for h in /tmp/KernelSU/kernel/include/*.h; do
            [ -f "$h" ] && cp "$h" "$GITHUB_WORKSPACE/drivers/KernelSU/"
          done

          # 改 drivers/Makefile，加入 KernelSU
          if ! grep -q "obj-y += KernelSU/" "$GITHUB_WORKSPACE/drivers/Makefile"; then
            echo "obj-y += KernelSU/" >> "$GITHUB_WORKSPACE/drivers/Makefile"
          fi

          # 验证关键文件存在
          ls -lh "$GITHUB_WORKSPACE/drivers/KernelSU/"
          if [ ! -f "$GITHUB_WORKSPACE/drivers/KernelSU/ksu.c" ] && \
             [ ! -f "$GITHUB_WORKSPACE/drivers/KernelSU/core_hook.c" ]; then
            echo "::error::KernelSU 核心 C 文件缺失！"
            exit 1
          fi
          echo "KernelSU 手动集成完成"

      # ── 4. 应用 4.19 non-GKI 补丁（解决 ksu_*_hook undefined symbol）──
      - name: Apply 4.19 patches
        run: |
          PATCH_DIR="/tmp/KernelSU/kernel/patches/4.19"
          if [ -d "$PATCH_DIR" ]; then
            echo "Applying 4.19 patches..."
            cd "$GITHUB_WORKSPACE"
            for p in "$PATCH_DIR"/*.patch; do
              [ -f "$p" ] || continue
              echo "  -> $(basename "$p")"
              git am --3way "$p" 2>/dev/null || echo "     (skip, may conflict)"
            done
          else
            echo "No 4.19 patch dir found, skip"
          fi

      # ── 5. 配置内核（锁 ls12_mt8797_wifi_64_defconfig）──
      - name: Configure kernel
        run: |
          CLANG_PATH="$PWD/prebuilts/clang/host/linux-x86/clang-r383902"
          CLANG_BIN="$CLANG_PATH/bin"
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-

          make O=out ARCH=arm64 \
            CC=$CLANG_BIN/clang \
            LD=$CLANG_BIN/ld.lld \
            AR=$CLANG_BIN/llvm-ar \
            NM=$CLANG_BIN/llvm-nm \
            OBJCOPY=$CLANG_BIN/llvm-objcopy \
            OBJDUMP=$CLANG_BIN/llvm-objdump \
            READELF=$CLANG_BIN/llvm-readelf \
            OBJSIZE=$CLANG_BIN/llvm-size \
            STRIP=$CLANG_BIN/llvm-strip \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM=1 LLVM_IAS=1 \
            ls12_mt8797_wifi_64_defconfig

          ./scripts/config --file out/.config \
            -e KPROBES -e HAVE_KPROBES \
            -e OVERLAY_FS \
            -e KSU
          make O=out ARCH=arm64 olddefconfig

      # ── 6. 编译内核 ──
      - name: Build Image.gz-dtb
        run: |
          CLANG_PATH="$PWD/prebuilts/clang/host/linux-x86/clang-r383902"
          CLANG_BIN="$CLANG_PATH/bin"
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-

          make O=out ARCH=arm64 \
            CC=$CLANG_BIN/clang \
            LD=$CLANG_BIN/ld.lld \
            AR=$CLANG_BIN/llvm-ar \
            NM=$CLANG_BIN/llvm-nm \
            OBJCOPY=$CLANG_BIN/llvm-objcopy \
            OBJDUMP=$CLANG_BIN/llvm-objdump \
            READELF=$CLANG_BIN/llvm-readelf \
            OBJSIZE=$CLANG_BIN/llvm-size \
            STRIP=$CLANG_BIN/llvm-strip \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM=1 LLVM_IAS=1 \
            -j$(nproc) 2>&1 | tee build.log
        continue-on-error: true

      # ── 7. 检查产物 ──
      - name: Check build result
        run: |
          if [ -f out/arch/arm64/boot/Image.gz-dtb ]; then
            echo "✅ Image.gz-dtb 生成成功"
            ls -lh out/arch/arm64/boot/Image.gz-dtb
          else
            echo "::warning::Image.gz-dtb 未生成"
            tail -200 build.log
          fi

      # ── 8. 打包 AnyKernel3 ──
      - name: Package AnyKernel3
        if: always()
        run: |
          if [ ! -f out/arch/arm64/boot/Image.gz-dtb ]; then
            echo "::notice::无 Image.gz-dtb，跳过打包"
            exit 0
          fi
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 -b master ak3
          cp out/arch/arm64/boot/Image.gz-dtb ak3/
          cd ak3
          ZIP="TALIH-PD2-KSU-${{ inputs.ksu_tag }}-clang.zip"
          zip -r ../$ZIP *
          echo "刷机包: $ZIP"

      # ── 9. 上传产物 ──
      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TALIH-PD2-KSU-${{ inputs.ksu_tag }}-clang
          path: |
            TALIH-PD2-KSU-*-clang.zip
            out/arch/arm64/boot/Image.gz-dtb
            build.log
